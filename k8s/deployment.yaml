apiVersion: apps/v1
kind: Deployment
metadata:
  name: codex-bioreactor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codex-bioreactor
  template:
    metadata:
      labels:
        app: codex-bioreactor
    spec:
      containers:
      - name: app
        image: codex/bioreactor:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codex-bioreactor-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codex-bioreactor
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
